<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Trade Calculator</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
  margin: 0;
}

/* SCALE FIX */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  justify-content: center;
  gap: 80px; /* bigger spacing */

  max-width: 1100px; /* SCALED UP */
  margin: 30px auto 0 auto;

  align-items: start;
}

/* TRADE BOX */
.trade-box {
  background: rgba(255,255,255,0.04);
  padding: 25px;
  border-radius: 18px;

  width: 100%;
  max-width: 360px; /* bigger */
  min-height: 600px; /* bigger */

  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  align-items: center;
}

/* SLOTS GRID */
.slots {
  display: grid;
  grid-template-columns: repeat(3, 120px); /* bigger slots */
  gap: 16px;
  justify-content: center;
  margin-top: 12px;
}

/* SLOT FIX (clean borders) */
.slot {
  width: 120px;
  height: 155px;

  background: #1e293b;
  border: 2px solid #334155;
  border-radius: 14px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  font-size: 12px;
  padding: 6px;
  overflow: hidden;

  box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
}

/* IMAGE */
.slot img {
  width: 78px;
  height: 78px;
  object-fit: contain;
  border-radius: 8px;
}

/* ICONS */
.icon-row {
  display: flex;
  gap: 5px;
  margin-top: 6px;
  justify-content: center;
}

.icon-row img {
  width: 24px;
  height: 24px;
}

/* BUTTONS */
.add {
  background: #38bdf8;
  border: none;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
}

.remove {
  background: #ef4444;
  border: none;
  color: white;
  padding: 4px;
  border-radius: 6px;
  cursor: pointer;
}

/* POPUP FIX */
.popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  background: #0f172a;
  border: 2px solid #334155;
  border-radius: 16px;

  width: 95%;
  max-width: 520px; /* scaled up */

  max-height: 85vh;
  overflow-y: auto;

  padding: 20px;
  z-index: 1000;
}

/* OVERLAY */
.overlay {
  display: none;
  position: fixed;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 999;
}

/* DRAGON LIST */
.dragon-list {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  max-height: 320px;
  overflow-y: auto;
}

/* CARD FIX */
.dragon-card {
  background: #334155;
  padding: 10px;
  border-radius: 10px;
  width: 110px;
  cursor: pointer;
  text-align: center;
  border: 2px solid transparent;
  transition: 0.2s;
}

.dragon-card img {
  width: 64px;
  height: 64px;
  border-radius: 8px;
}

/* BLUE SELECT FIX */
.dragon-card.selected {
  border: 2px solid #38bdf8;
  box-shadow: 0 0 14px #38bdf8;
  transform: scale(1.05);
}

/* BAR */
.bar {
  width: 85%;
  height: 20px;
  background: #334155;
  margin: 25px auto;
  border-radius: 10px;
  overflow: hidden;
}

#wfl {
  height: 100%;
  width: 50%;
  background: #22c55e;
  transition: 0.3s;
}

#wflText {
  margin-top: 12px;
  font-weight: bold;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>Dragon Adventures Trade Calculator</h1>

<div class="container">
  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slots"></div>
  </div>

  <div class="trade-box">
    <h2>Them</h2>
    <div id="themSlots" class="slots"></div>
  </div>
</div>

<div class="bar"><div id="wfl"></div></div>
<div id="wflText"></div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <div id="dragonList" class="dragon-list"></div>
</div>

<div class="popup" id="optionsPopup">
  <h3>Dragon Options</h3>

  <label><input type="checkbox" id="mut"> Mutation</label>
  <label><input type="checkbox" id="legC"> Legendary Color</label>
  <label><input type="checkbox" id="legE"> Legendary Eye</label>

  <br><br>
  <button onclick="confirmAdd()">Add Dragon</button>
</div>

<script>

/* FIX DOM */
const popup = document.getElementById("popup");
const overlay = document.getElementById("overlay");
const optionsPopup = document.getElementById("optionsPopup");

const mut = document.getElementById("mut");
const legC = document.getElementById("legC");
const legE = document.getElementById("legE");

const wfl = document.getElementById("wfl");
const wflText = document.getElementById("wflText");

/* DRAGONS (UNCHANGED SYSTEM) */
const dragons = [
  { name:"Veidreki", value:"35M", img:"https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name:"Alatura", value:"17M", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name:"Venid", value:"2K", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" }
];

let you=[], them=[], activeSide=null, pendingDragon=null;
const MAX=9;

/* VALUE */
function getValue(item){
  let base=item.base.value.includes("M")
    ? parseFloat(item.base.value)*1e6
    : parseFloat(item.base.value)*1e3;

  let extra=0;
  if(item.mutation) extra+=500000;
  if(item.legColor) extra+=1000000;
  if(item.legEye) extra+=1000000;

  return base+extra;
}

/* RENDER */
function render(){
  draw("youSlots",you,1);
  draw("themSlots",them,2);
}

function draw(id,list,side){
  let box=document.getElementById(id);
  box.innerHTML="";

  for(let i=0;i<MAX;i++){
    let slot=document.createElement("div");
    slot.className="slot";

    let item=list[i];

    if(item){
      slot.innerHTML=`
        <img src="${item.base.img}">
        <small>${item.base.name}</small>

        <div class="icon-row">
          ${item.mutation ? "🧬" : ""}
          ${item.legColor ? "🌈" : ""}
          ${item.legEye ? "👁️" : ""}
        </div>

        <button class="remove" onclick="remove(${side},${i})">X</button>
      `;
    } else {
      slot.innerHTML=`<button class="add" onclick="openPopup(${side})">+</button>`;
    }

    box.appendChild(slot);
  }
}

/* POPUP */
function openPopup(side){
  activeSide=side;
  popup.style.display="block";
  overlay.style.display="block";
  renderList();
}

function closePopup(){
  popup.style.display="none";
  overlay.style.display="none";
  optionsPopup.style.display="none";
}

function renderList(){
  let box=document.getElementById("dragonList");
  box.innerHTML="";

  dragons.forEach(d=>{
    let div=document.createElement("div");
    div.className="dragon-card";

    div.innerHTML=`<img src="${d.img}"><div>${d.name}</div>`;

    div.onclick=()=>{
      document.querySelectorAll(".dragon-card")
        .forEach(c=>c.classList.remove("selected"));

      div.classList.add("selected");
      addDragon(d);
    };

    box.appendChild(div);
  });
}

function addDragon(d){
  pendingDragon=d;
  optionsPopup.style.display="block";
}

function confirmAdd(){
  let item={
    base:pendingDragon,
    mutation:mut.checked,
    legColor:legC.checked,
    legEye:legE.checked
  };

  if(activeSide===1) you.push(item);
  if(activeSide===2) them.push(item);

  closePopup();
  update();
}

function remove(side,i){
  (side===1?you:them).splice(i,1);
  update();
}

/* WFL */
function update(){
  render();

  let y=you.reduce((s,i)=>s+getValue(i),0);
  let t=them.reduce((s,i)=>s+getValue(i),0);
  let diff=t-y;

  let w=50+(diff/Math.max(y,t||1))*50;
  w=Math.max(0,Math.min(100,w));

  wfl.style.width=w+"%";
  wflText.innerText=
    diff===0?"FAIR":
    diff>0?"THEM WIN":"YOU WIN";
}

render();
update();

</script>

</body>
</html>
