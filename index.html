<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Trade Calculator</title>

  <style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
    margin: 0;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 60px;
    align-items: flex-start;
    
    max-width: 900px;
    margin: 20px auto;
  }

  .trade-box {
    background: rgba(255,255,255,0.04);
    padding: 20px 20px 25px 18px;
    border-radius: 15px;

    width: 100%;
    max-width: 300px;
    min-height: 520px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    align-items: center;

    flex: 1;
  }

  .slots {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 14px;
    justify-content: center;
    margin-top: 10px;
  }

  .slot {
    width: 110px;
    height: 145px;
    box-sizing: border-box;

    background: #1e293b;
    border: 2px solid #334155;
    border-radius: 14px;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;

    font-size: 12px;
    padding: 4px;
    overflow: hidden;

    box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
  }

  .slot img {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    object-fit: contain;
  }

  .icon-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 5px;
  }

  .icon-row img {
    width: 26px;
    height: 26px;
    object-fit: contain;
  }

  .add {
    background: #38bdf8;
    border: none;
    padding: 5px;
    border-radius: 5px;
    cursor: pointer;
  }

  .remove {
    background: #ef4444;
    border: none;
    color: white;
    padding: 3px;
    border-radius: 5px;
    cursor: pointer;
  }

  .popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #0f172a;
    border: 2px solid #334155;
    border-radius: 15px;

    width: 90%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 18px;
    z-index: 1000;
  }

  .overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.6);
    z-index: 999;
  }

  .dragon-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .dragon-card {
    background: #334155;
    padding: 10px;
    border-radius: 10px;
    width: 100px;
    cursor: pointer;
    text-align: center;
    transition: 0.15s;
  }

  .dragon-card img {
    width: 60px;
    height: 60px;
    border-radius: 8px;
  }

  /* 🔵 BLUE SELECTION */
  .dragon-card.selected {
    outline: 3px solid #38bdf8;
    transform: scale(1.05);
  }

  .bar {
    width: 80%;
    height: 18px;
    background: #334155;
    margin: 20px auto;
    border-radius: 10px;
    overflow: hidden;
  }

  #wfl {
    height: 100%;
    width: 50%;
    background: #22c55e;
    transition: 0.3s;
  }

  #wflText {
    margin-top: 10px;
    font-weight: bold;
  }

  input {
    width: 95%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
  }

  .popup label {
    display: block;
    margin: 8px 0;
    font-size: 14px;
  }
  </style>
</head>

<body>

<h1>Dragon Adventures Trade W/F/L</h1>

<div class="container">

  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slots"></div>
  </div>

  <div class="trade-box">
    <h2>Them</h2>
    <div id="themSlots" class="slots"></div>
  </div>

</div>

<div class="bar">
  <div id="wfl"></div>
</div>

<div id="wflText"></div>
<div id="result"></div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <input id="searchBox" placeholder="Search dragons..." oninput="filterDragons()">
  <div id="dragonList" class="dragon-list"></div>
</div>

<div class="popup" id="optionsPopup">

  <h3>Dragon Options</h3>

  <!--  FIXED MUTATION -->
  <label>
    Mutations:
    <select id="mut">
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
  </label>

  <label><input type="checkbox" id="legC"> Legendary Color</label>
  <label><input type="checkbox" id="legE"> Legendary Eye</label>

  <br><br>

  <button style="
    background:#38bdf8;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
  " onclick="confirmAdd()">
    Add Dragon
  </button>

</div>

<script>

const dragons = [
  { name:"Veidreki", value:"35M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name:"Alatura", value:"17M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name:"Moixura", value:"9M", type:"guild", img:"https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png" },
  { name:"Venid", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" },
];

const bonuses = {
  mutation: { world:250000, season:500000, guild:500000, event:250000 },
  legColor: { world:500000, season:1000000, guild:1000000, event:500000 },
  legEye: { world:500000, season:1000000, guild:1000000, event:1000000 }
};

let you=[], them=[], activeSide=null, pendingDragon=null;
const MAX=9;

/* VALUE */
function parse(v){
  v=v.toUpperCase();
  if(v.includes("M")) return parseFloat(v)*1e6;
  if(v.includes("K")) return parseFloat(v)*1e3;
  return parseFloat(v);
}

function getFinalValue(item){
  let base=parse(item.base.value), extra=0;

  if(item.mutations) extra += item.mutations * (bonuses.mutation[item.base.type]||0);
  if(item.legColor) extra+=bonuses.legColor[item.base.type]||0;
  if(item.legEye) extra+=bonuses.legEye[item.base.type]||0;

  return base+extra;
}

/* RENDER */
function render(){
  draw("youSlots",you,1);
  draw("themSlots",them,2);
}

function draw(id,list,side){
  let box=document.getElementById(id);
  box.innerHTML="";

  for(let i=0;i<MAX;i++){
    let slot=document.createElement("div");
    slot.className="slot";

    let item=list[i];

    if(item){
      slot.innerHTML=`
        <img src="${item.base.img}">
        <small>${item.base.name}</small>

        <div class="icon-row">
          ${item.mutations ? '<img src="https://static.wikia.nocookie.net/dragon-adventures/images/e/ec/Mutation_Potion.png">' : ""}
          ${item.legColor ? '<img src="https://static.wikia.nocookie.net/dragon-adventures/images/4/4f/Legendary_Color_Potion.png">' : ""}
          ${item.legEye ? '<img src="https://static.wikia.nocookie.net/dragon-adventures/images/f/f9/Legendary_Pupil_Potion.png">' : ""}
        </div>

        <button class="remove" onclick="remove(${side},${i})">➖</button>
      `;
    } else {
      slot.innerHTML=`<button class="add" onclick="openPopup(${side})">➕</button>`;
    }

    box.appendChild(slot);
  }
}

/* POPUP */
function openPopup(side){
  activeSide=side;
  popup.style.display="block";
  overlay.style.display="block";
  renderDragonList(dragons);
}

function closePopup(){
  popup.style.display="none";
  overlay.style.display="none";
  optionsPopup.style.display="none";
}

/* 🔵 DRAGON SELECT */
function renderDragonList(list){
  let box=document.getElementById("dragonList");
  box.innerHTML="";

  list.forEach(d=>{
    let div=document.createElement("div");
    div.className="dragon-card";

    div.innerHTML=`<img src="${d.img}"><div>${d.name}</div>`;

    div.onclick=()=>{

      document.querySelectorAll(".dragon-card")
        .forEach(c=>c.classList.remove("selected"));

      div.classList.add("selected");

      pendingDragon=d;
      setTimeout(()=>optionsPopup.style.display="block",120);
    };

    box.appendChild(div);
  });
}

function filterDragons(){
  let val=searchBox.value.toLowerCase();
  renderDragonList(dragons.filter(d=>d.name.toLowerCase().includes(val)));
}

/* ADD */
function confirmAdd(){
  let item={
    base:pendingDragon,
    mutations: parseInt(mut.value),
    legColor: legC.checked,
    legEye: legE.checked
  };

  if(activeSide===1 && you.length<MAX) you.push(item);
  if(activeSide===2 && them.length<MAX) them.push(item);

  closePopup();
  update();
}

function remove(side,i){
  side===1?you.splice(i,1):them.splice(i,1);
  update();
}

/* WFL */
function update(){
  render();

  let y=you.reduce((s,i)=>s+getFinalValue(i),0);
  let t=them.reduce((s,i)=>s+getFinalValue(i),0);

  let diff=t-y;

  let label = diff===0 ? "FAIR TRADE"
    : Math.abs(diff)<1_000_000 ? (diff>0?"SMALL WIN":"SMALL LOSS")
    : (diff>0?"WIN":"LOSS");

  let w=50+(diff/Math.max(y,t||1))*50;
  w=Math.max(0,Math.min(100,w));

  wfl.style.width=w+"%";
  wfl.style.background=diff>0?"#22c55e":diff<0?"#ef4444":"#facc15";

  wflText.innerText=label;
  result.innerText=`You: ${y.toLocaleString()} | Them: ${t.toLocaleString()}`;
}

render();
update();

</script>

</body>
</html>
