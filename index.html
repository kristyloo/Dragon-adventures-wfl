<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Trade Calculator</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
  margin: 0;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  justify-content: center;
  gap: 60px;

  max-width: 900px;
  margin: 20px auto 0 auto;

  align-items: start;
}

.trade-box {
  background: rgba(255,255,255,0.04);
  padding: 20px 20px 25px 18px;
  border-radius: 15px;

  width: 100%;
  max-width: 300px;

  min-height: 520px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  align-items: center;
}

.slots {
  display: grid;
  grid-template-columns: repeat(3, 110px);
  gap: 14px;
  justify-content: center;
  margin-top: 10px;
}

.slot {
  width: 110px;
  height: 145px;

  background: #1e293b;
  border: 2px solid #334155;
  border-radius: 14px;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  font-size: 12px;
  padding: 4px;
  overflow: hidden;

  box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
}

.slot img {
  width: 72px;
  height: 72px;
  border-radius: 8px;
  object-fit: contain;
}

/* ICONS RESTORED */
.icon-row {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin-top: 5px;
}

.icon-row img {
  width: 26px;
  height: 26px;
}

.add {
  background: #38bdf8;
  border: none;
  padding: 5px;
  border-radius: 5px;
  cursor: pointer;
}

.remove {
  background: #ef4444;
  border: none;
  color: white;
  padding: 3px;
  border-radius: 5px;
  cursor: pointer;
}

.popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #0f172a;
  border: 2px solid #334155;
  border-radius: 15px;

  width: 90%;
  max-width: 420px;

  max-height: 80vh;
  overflow-y: auto;

  padding: 18px;
  z-index: 1000;
}

.overlay {
  display: none;
  position: fixed;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 999;
}

.dragon-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  max-height: 300px;
  overflow-y: auto;
}

.dragon-card {
  background: #334155;
  padding: 10px;
  border-radius: 10px;
  width: 100px;
  cursor: pointer;
  text-align: center;
  border: 2px solid transparent;
}

.dragon-card.selected {
  border: 2px solid #38bdf8;
  box-shadow: 0 0 12px #38bdf8;
}

.dragon-card img {
  width: 60px;
  height: 60px;
  border-radius: 8px;
}

.bar {
  width: 80%;
  height: 18px;
  background: #334155;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

#wfl {
  height: 100%;
  width: 50%;
  background: #22c55e;
  transition: 0.3s;
}

#wflText {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slots"></div>
  </div>

  <div class="trade-box">
    <h2>Them</h2>
    <div id="themSlots" class="slots"></div>
  </div>
</div>

<div class="bar"><div id="wfl"></div></div>
<div id="wflText"></div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <div id="dragonList" class="dragon-list"></div>
</div>

<div class="popup" id="optionsPopup">
  <h3>Dragon Options</h3>

  <label><input type="checkbox" id="mut"> Mutation</label>
  <label><input type="checkbox" id="legC"> Legendary Color</label>
  <label><input type="checkbox" id="legE"> Legendary Eye</label>

  <button onclick="confirmAdd()">Add Dragon</button>
</div>

<script>

/* FIX: DOM REFERENCES */
const popup = document.getElementById("popup");
const overlay = document.getElementById("overlay");
const optionsPopup = document.getElementById("optionsPopup");

const mut = document.getElementById("mut");
const legC = document.getElementById("legC");
const legE = document.getElementById("legE");

const wfl = document.getElementById("wfl");
const wflText = document.getElementById("wflText");

let you=[], them=[], activeSide=null, pendingDragon=null;
const MAX=9;

/* YOUR DRAGONS (UNCHANGED WOULD GO HERE) */
const dragons = [
  { name:"Veidreki", value:"35M", img:"https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name:"Alatura", value:"17M", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name:"Venid", value:"2K", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" }
];

/* VALUE */
function parse(v){
  v=v.toUpperCase();
  if(v.includes("M")) return parseFloat(v)*1e6;
  if(v.includes("K")) return parseFloat(v)*1e3;
  return parseFloat(v);
}

function getValue(item){
  let base=parse(item.base.value);
  let extra=0;
  if(item.mutation) extra+=500000;
  if(item.legColor) extra+=1000000;
  if(item.legEye) extra+=1000000;
  return base+extra;
}

/* RENDER */
function render(){
  draw("youSlots",you,1);
  draw("themSlots",them,2);
}

function draw(id,list,side){
  let box=document.getElementById(id);
  box.innerHTML="";

  for(let i=0;i<MAX;i++){
    let slot=document.createElement("div");
    slot.className="slot";

    let item=list[i];

    if(item){
      slot.innerHTML=`
        <img src="${item.base.img}">
        <small>${item.base.name}</small>

        <div class="icon-row">
          ${item.mutation ? "🧬" : ""}
          ${item.legColor ? "🌈" : ""}
          ${item.legEye ? "👁️" : ""}
        </div>

        <button class="remove" onclick="remove(${side},${i})">X</button>
      `;
    } else {
      slot.innerHTML=`<button class="add" onclick="openPopup(${side})">+</button>`;
    }

    box.appendChild(slot);
  }
}

/* POPUPS */
function openPopup(side){
  activeSide=side;
  popup.style.display="block";
  overlay.style.display="block";
  renderList();
}

function closePopup(){
  popup.style.display="none";
  overlay.style.display="none";
  optionsPopup.style.display="none";
}

function renderList(){
  let box=document.getElementById("dragonList");
  box.innerHTML="";

  dragons.forEach(d=>{
    let div=document.createElement("div");
    div.className="dragon-card";

    div.innerHTML=`<img src="${d.img}"><div>${d.name}</div>`;

    div.onclick=()=>{
      document.querySelectorAll(".dragon-card")
        .forEach(c=>c.classList.remove("selected"));

      div.classList.add("selected");
      addDragon(d);
    };

    box.appendChild(div);
  });
}

function addDragon(d){
  pendingDragon=d;
  optionsPopup.style.display="block";
}

function confirmAdd(){
  let item={
    base:pendingDragon,
    mutation:mut.checked,
    legColor:legC.checked,
    legEye:legE.checked
  };

  if(activeSide===1) you.push(item);
  if(activeSide===2) them.push(item);

  closePopup();
  update();
}

function remove(side,i){
  (side===1?you:them).splice(i,1);
  update();
}

/* WFL */
function update(){
  render();

  let y=you.reduce((s,i)=>s+getValue(i),0);
  let t=them.reduce((s,i)=>s+getValue(i),0);
  let diff=t-y;

  let label =
    diff===0?"FAIR":
    diff>0?"THEM WIN":"YOU WIN";

  let w=50+(diff/Math.max(y,t||1))*50;
  w=Math.max(0,Math.min(100,w));

  wfl.style.width=w+"%";
  wflText.innerText=label;
}

render();
update();

</script>

</body>
</html>
