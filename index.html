<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Trade W/F/L</title>

  <style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
    margin: 0;
    overflow-x: hidden;
  }

  html, body {
    height: 100%;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(2, minmax(260px, 320px));
    justify-content: center;
    gap: 60px;
    max-width: 900px;
    margin: 20px auto 0 auto;
    align-items: start;
  }

  .trade-box {
    background: rgba(255,255,255,0.04);
    padding: 20px;
    border-radius: 15px;
    width: 100%;
    max-width: 320px;
    min-height: 520px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .slots {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 14px;
    justify-content: center;
    margin-top: 10px;
  }

  .slot {
    width: 100px;
    height: 140px;
    background: #1e293b;
    border: 2px solid #334155;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    font-size: 12px;
    padding: 4px;
    overflow: hidden;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
  }

  .slot img {
    width: 68px;
    height: 68px;
    border-radius: 8px;
    object-fit: contain;
  }

  .icon-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 4px;
  }

  .icon-row img {
    width: 22px;
    height: 22px;
  }

  .add {
    background: #38bdf8;
    border: none;
    padding: 5px;
    border-radius: 5px;
    cursor: pointer;
  }

  .remove {
    background: #ef4444;
    border: none;
    color: white;
    padding: 3px;
    border-radius: 5px;
    cursor: pointer;
  }

  .popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #0f172a;
    border: 2px solid #334155;
    border-radius: 15px;
    width: 90%;
    max-width: 420px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 18px;
    z-index: 1000;
  }

  .overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.6);
    z-index: 999;
  }

  .dragon-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-height: 300px;
    overflow-y: auto;
  }

  .dragon-card {
    background: #334155;
    padding: 10px;
    border-radius: 10px;
    width: 100px;
    cursor: pointer;
    text-align: center;
  }

  .dragon-card img {
    width: 60px;
    height: 60px;
    border-radius: 8px;
  }

  .bar {
    width: 80%;
    height: 18px;
    background: #334155;
    margin: 25px auto;
    border-radius: 10px;
    overflow: hidden;
  }

  #wfl {
    height: 100%;
    width: 50%;
    background: #22c55e;
    transition: 0.3s;
  }

  #wflText {
    margin-top: 10px;
    font-weight: bold;
  }

  input {
    width: 95%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
  }

  .popup label {
    display: block;
    margin: 8px 0;
    font-size: 14px;
  }
  </style>
</head>

<body>

<h1>Dragon Adventures Trade W/F/L</h1>

<div class="container">
  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slots"></div>
  </div>

  <div class="trade-box">
    <h2>Them</h2>
    <div id="themSlots" class="slots"></div>
  </div>
</div>

<div class="bar">
  <div id="wfl"></div>
</div>

<div id="wflText"></div>
<div id="result"></div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <input id="searchBox" placeholder="Search dragons..." oninput="filterDragons()">
  <div id="dragonList" class="dragon-list"></div>
</div>

<div class="popup" id="optionsPopup">
  <h3>Dragon Options</h3>

  <label>Mutations:
    <select id="mutCount">
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
    </select>
  </label>

  <label><input type="checkbox" id="legC"> Legendary Color</label>
  <label><input type="checkbox" id="legE"> Legendary Eye</label>

  <br><br>

  <button onclick="confirmAdd()">Add Dragon</button>
</div>

<script>

const dragons = [
  { name:"Veidreki", value:"35M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name:"Alatura", value:"17M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name:"Venid", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" }
];

const bonuses = {
  mutation: {
    world: 50000,
    season: 100000,
    guild: 100000,
    event: 50000
  },
  legColor: {
    world: 500000,
    season: 1000000,
    guild: 1000000,
    event: 500000
  },
  legEye: {
    world: 500000,
    season: 1000000,
    guild: 1000000,
    event: 1000000
  }
};

let you=[], them=[], activeSide=null, pendingDragon=null;
const MAX=9;

function parse(v){
  if(v.includes("M")) return parseFloat(v)*1e6;
  if(v.includes("K")) return parseFloat(v)*1e3;
  return parseFloat(v);
}

/* 🔥 FIXED MUTATION SYSTEM */
function getFinalValue(item){
  let base = parse(item.base.value);
  let extra = 0;

  // MUTATION STACK (0–5)
  extra += (bonuses.mutation[item.base.type] || 0) * (item.mutCount || 0);

  if(item.legColor)
    extra += bonuses.legColor[item.base.type] || 0;

  if(item.legEye)
    extra += bonuses.legEye[item.base.type] || 0;

  return base + extra;
}

function draw(id,list){
  let box=document.getElementById(id);
  box.innerHTML="";

  for(let i=0;i<MAX;i++){
    let slot=document.createElement("div");
    slot.className="slot";

    let item=list[i];

    if(item){
      slot.innerHTML=`
        <img src="${item.base.img}">
        <small>${item.base.name}</small>
        <div>Mut: ${item.mutCount || 0}</div>
        <button class="remove" onclick="remove(${id==='youSlots'?1:2},${i})">➖</button>
      `;
    } else {
      slot.innerHTML=`<button class="add" onclick="openPopup(${id==='youSlots'?1:2})">➕</button>`;
    }

    box.appendChild(slot);
  }
}

function openPopup(side){
  activeSide=side;
  popup.style.display="block";
  overlay.style.display="block";
  renderDragons();
}

function closePopup(){
  popup.style.display="none";
  optionsPopup.style.display="none";
  overlay.style.display="none";
}

function renderDragons(){
  dragonList.innerHTML="";

  dragons.forEach(d=>{
    let div=document.createElement("div");
    div.className="dragon-card";

    div.innerHTML=`<img src="${d.img}"><div>${d.name}</div>`;

    div.onclick=()=>{
      pendingDragon=d;
      optionsPopup.style.display="block";
    };

    dragonList.appendChild(div);
  });
}

function filterDragons(){
  let v=searchBox.value.toLowerCase();
  renderDragons(dragons.filter(d=>d.name.toLowerCase().includes(v)));
}

function confirmAdd(){

  let item={
    base:pendingDragon,
    mutCount:parseInt(mutCount.value),
    legColor:legC.checked,
    legEye:legE.checked
  };

  if(activeSide===1 && you.length<MAX) you.push(item);
  if(activeSide===2 && them.length<MAX) them.push(item);

  closePopup();
  update();
}

function remove(side,i){
  side===1?you.splice(i,1):them.splice(i,1);
  update();
}

function update(){

  draw("youSlots",you);
  draw("themSlots",them);

  let y=you.reduce((s,i)=>s+getFinalValue(i),0);
  let t=them.reduce((s,i)=>s+getFinalValue(i),0);

  let diff=t-y;

  let w=50+(diff/Math.max(y,t||1))*50;
  w=Math.max(0,Math.min(100,w));

  wfl.style.width=w+"%";
  wfl.style.background=
    diff>0?"#22c55e":
    diff<0?"#ef4444":"#facc15";

  wflText.innerText=
    diff===0?"FAIR TRADE":
    Math.abs(diff)<1_000_000?
    (diff>0?"SMALL WIN":"SMALL LOSS"):
    (diff>0?"WIN":"LOSS");
}

renderDragons();
update();

</script>

</body>
</html>
