<!DOCTYPE html>
<html>
<head>
  <title>Dragon Adventures Trade WFL</title>

  <style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;

    margin: 0;
    padding: 20px;
  }

  .page {
    padding: 20px;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    justify-content: center;
    gap: 60px;

    max-width: 900px;
    margin: 20px auto 0 auto;

    align-items: start;
  }

  .trade-box {
    background: rgba(255,255,255,0.04);
    padding: 20px 20px 25px 18px;
    border-radius: 15px;

    width: 100%;
    max-width: 300px;

    min-height: 520px;
    box-sizing: border-box;

    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .slots {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    gap: 14px;
    justify-content: center;
    margin-top: 10px;
  }

  .slot {
    width: 110px;
    height: 145px;
    background: #1e293b; 
    border: 2px solid #334155;
    border-radius: 14px;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;  

    font-size: 12px;
    padding: 4px;
    overflow: hidden;
    
    box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
  }

  .slot img {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    object-fit: contain;
  }

  .icon-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 5px;
  }

  .icon-row img {
    width: 26px;
    height: 26px;
  }

  .add {
    background: #38bdf8;
    border: none;
    padding: 5px;
    border-radius: 5px;
    cursor: pointer;
  }

  .remove {
    background: #ef4444;
    border: none;
    color: white;
    padding: 3px;
    border-radius: 5px;
    cursor: pointer;
  }

  /* FIXED POPUP */
  .popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    background: #0f172a;
    border: 2px solid #334155;
    border-radius: 15px;

    width: 95%;
    max-width: 520px;

    max-height: 85vh;
    overflow-y: auto;

    padding: 20px;
    z-index: 1000;
  }

  .overlay {
    display: none;
    position: fixed;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.6);
    z-index: 999;
  }

  .dragon-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-height: 300px;
    overflow-y: auto;
  }

  .dragon-card {
    background: #334155;
    padding: 10px;
    border-radius: 10px;
    width: 100px;
    cursor: pointer;
    text-align: center;

    border: 2px solid transparent;
    transition: 0.2s;
  }

  .dragon-card.selected {
    border: 2px solid #38bdf8;
    box-shadow: 0 0 10px #38bdf8;
  }

  .dragon-card img {
    width: 60px;
    height: 60px;
    border-radius: 8px;
  }

  .bar {
    width: 80%;
    height: 18px;
    background: #334155;
    margin: 20px auto;
    border-radius: 10px;
    overflow: hidden;
  }

  #wfl {
    height: 100%;
    width: 50%;
    background: #22c55e;
    transition: 0.3s;
  }

  #wflText {
    margin-top: 10px;
    font-weight: bold;
  }

  input {
    width: 95%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
  }

  /* CHECKBOX ALIGNMENT FIX */
  .popup label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 10px 0;
  }

  .popup input[type="checkbox"] {
    transform: scale(1.2);
  }

  /* 📱 MOBILE STACK FIX */
  @media (max-width: 700px) {
    .container {
      grid-template-columns: 1fr;
      gap: 30px;
    }
  }
</style>
</head>

<body>

<div class="page">

<h1>Dragon Adventures Trade W/F/L</h1>

<div class="container">

  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slots"></div>
  </div>

  <div class="trade-box">
    <h2>Them</h2>
    <div id="themSlots" class="slots"></div>
  </div>

</div>

<div class="bar">
  <div id="wfl"></div>
</div>

<div id="wflText"></div>
<div id="result"></div>

</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <input id="searchBox" placeholder="Search dragons..." oninput="filterDragons()">
  <div id="dragonList" class="dragon-list"></div>
</div>

<div class="popup" id="optionsPopup">
  <h3>Dragon Options</h3>

  <label><input type="checkbox" id="mut"> Mutation</label>
  <label><input type="checkbox" id="legC"> Legendary Color</label>
  <label><input type="checkbox" id="legE"> Legendary Eye</label>

  <br><br>

  <button style="
    background:#38bdf8;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
  " onclick="confirmAdd()">Add Dragon</button>
</div>

<script>


const dragons = [
  { name:"Veidreki", value:"35M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name:"Alatura", value:"17M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name:"Moixura", value:"9M", type:"guild", img:"https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png" },
  { name:"Venid", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" },
  { name:"Voltstorm", value:"3M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/7/76/Voltstorm_Icon.png" },
  { name:"Vulpiruth", value:"50K", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/b/b1/Vulpiruth_Icon.png" },
  { name:"Djaevelhest", value:"150K", type:"event", img:"https://static.wikia.nocookie.net/dragon-adventures/images/b/b0/Djaevelhest_Icon.png" },
  { name:"Impiavolo", value:"800K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/3/39/Impiavolo_Icon.png" },
  { name:"Seikarin", value: "4M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/df/Seikarin_Icon.png"},
  { name:"Constello", value:"9M", type:"guild", img:"https://static.wikia.nocookie.net/dragon-adventures/images/7/7c/Constello_Icon.png"},
  { name:"Eryndiorn", value:"10M", type:"guild", img:"https://static.wikia.nocookie.net/dragon-adventures/images/5/5f/Eryndiorn_Icon.png"},
  { name:"Agricos", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/6/66/Agricos_Icon.png"},
  { name:"Alrenoth", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/5/59/Alrenoth_Icon.png"},
  { name:"Amphyll", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/4/49/Amphyll_Icon.png"},
  { name:"Atarix", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/4/49/Atarix_Icon.png"},
  { name:"Bisonture", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/dc/Bisonture_Icon.png"}, 
  { name:"Bizaltidath", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/4/44/Bizaltidath_Icon.png"},
  { name:"Chronocus", value:"10K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/3/31/Chronocus_Icon.png"},
  { name:"Cocovira", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/4/4d/Cocovira_Icon.png"}, 
  { name:"Coralina", value:"5K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/a/a2/Coralina_Icon.png"},
  { name:"Dexyn", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/9/95/Dexyn_Icon.png"},
  { name:"Dunvolth", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/8b/Dunvolth_Icon.png"},
  { name:"Enkylous", value:"3K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/2/2d/Enkylous_Icon.png"},
  { name:"Ferorex", value:"5K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/7/77/Ferorex_Icon.png"},
  { name:"Geliklen", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/1/1e/Geliklen_Icon.png"},
  { name:"Glacegar", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/e/e6/Glacegar_Icon.png"},
  { name:"Howler", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/89/Howler_Icon.png"},
  { name:"Karukiri", value:"10K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/4/43/Karukiri_Icon.png"},
  { name:"Khepera", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/3/34/Khepera_Icon.png"},
];

let you=[], them=[], activeSide=null, pendingDragon=null;
const MAX=9;

function parse(v){
  v=v.toUpperCase();
  if(v.includes("M")) return parseFloat(v)*1e6;
  if(v.includes("K")) return parseFloat(v)*1e3;
  return parseFloat(v);
}

function getFinalValue(item){
  let base=parse(item.base.value), extra=0;
  if(item.mutation) extra+=500000;
  if(item.legColor) extra+=1000000;
  if(item.legEye) extra+=1000000;
  return base+extra;
}

function render(){
  draw("youSlots",you,1);
  draw("themSlots",them,2);
}

function draw(id,list,side){
  let box=document.getElementById(id);
  box.innerHTML="";
  for(let i=0;i<MAX;i++){
    let slot=document.createElement("div");
    slot.className="slot";
    let item=list[i];

    if(item){
      slot.innerHTML=`
        <img src="${item.base.img}">
        <small>${item.base.name}</small>
        <button class="remove" onclick="remove(${side},${i})">➖</button>
      `;
    } else {
      slot.innerHTML=`<button class="add" onclick="openPopup(${side})">➕</button>`;
    }

    box.appendChild(slot);
  }
}

function openPopup(side){
  activeSide=side;
  popup.style.display="block";
  overlay.style.display="block";
  renderDragonList(dragons);
}

function closePopup(){
  popup.style.display="none";
  overlay.style.display="none";
  optionsPopup.style.display="none";
}

function renderDragonList(list){
  let box=document.getElementById("dragonList");
  box.innerHTML="";
  list.forEach(d=>{
    let div=document.createElement("div");
    div.className="dragon-card";
    div.innerHTML=`<img src="${d.img}"><div>${d.name}</div>`;
    
    div.onclick=()=>{
      document.querySelectorAll(".dragon-card").forEach(c=>c.classList.remove("selected"));
      div.classList.add("selected");
      addDragon(d);
    };

    box.appendChild(div);
  });
}

function addDragon(d){
  pendingDragon=d;
  optionsPopup.style.display="block";
}

function confirmAdd(){
  let item={
    base:pendingDragon,
    mutation:mut.checked,
    legColor:legC.checked,
    legEye:legE.checked
  };

  if(activeSide===1 && you.length<MAX) you.push(item);
  if(activeSide===2 && them.length<MAX) them.push(item);

  closePopup();
  update();
}

function remove(side,i){
  side===1?you.splice(i,1):them.splice(i,1);
  update();
}

function update(){
  render();
  let y=you.reduce((s,i)=>s+getFinalValue(i),0);
  let t=them.reduce((s,i)=>s+getFinalValue(i),0);
  let diff=t-y;

  let label = diff===0 ? "FAIR TRADE" :
    Math.abs(diff)<1_000_000 ? (diff>0?"SMALL WIN":"SMALL LOSS") :
    (diff>0?"WIN":"LOSS");

  let w=50+(diff/Math.max(y,t||1))*50;
  w=Math.max(0,Math.min(100,w));

  wfl.style.width=w+"%";
  wfl.style.background=diff>0?"#22c55e":diff<0?"#ef4444":"#facc15";

  wflText.innerText=label;
  result.innerText=`You: ${y.toLocaleString()} | Them: ${t.toLocaleString()}`;
}

render();
update();

</script>

</body>
</html>
