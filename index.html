<!DOCTYPE html>
<html>
<head>
<title>Dragon Adventures Trade Calculator</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
  margin: 0;
}

/* MAIN LAYOUT */
.container {
  display: grid;
  grid-template-columns: 1fr 120px 1fr;
  align-items: start;
  justify-content: center;
  max-width: 1100px;
  margin: 40px auto;
}

/* MIDDLE ARROW */
.middle {
  display: flex;
  align-items: center;
  justify-content: center;
}

.arrow {
  width: 70px;
  height: auto;
  opacity: 0.9;
}

/* TRADE BOX */
.trade-box {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 18px;
  width: 360px;
  min-height: 520px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* SLOTS GRID */
.slots {
  display: grid;
  grid-template-columns: repeat(3, 95px);
  gap: 14px;
  justify-content: center;
  margin-top: 10px;
}

/* SLOT */
.slot {
  width: 95px;
  height: 95px;
  background: #1e1b4b;
  border: 2px solid #312e81;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px;
  box-shadow:
    inset 0 0 8px rgba(0,0,0,0.6),
    0 4px 10px rgba(0,0,0,0.3);
}

.slot img {
  width: 60px;
  height: 60px;
  object-fit: contain;
}

.icon-row {
  display: flex;
  gap: 3px;
  margin-top: 3px;
}

.icon-row img {
  width: 20px;
  height: 20px;
}

.add {
  background: #38bdf8;
  border: none;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
}

.remove {
  background: #ef4444;
  border: none;
  color: white;
  padding: 3px;
  border-radius: 5px;
  cursor: pointer;
}

/* POPUPS */
.popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #0f172a;
  border: 2px solid #334155;
  border-radius: 15px;
  width: 90%;
  max-width: 420px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 18px;
  z-index: 1000;
}

.overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 999;
}

.dragon-list {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.dragon-card {
  background: #334155;
  padding: 10px;
  border-radius: 10px;
  width: 100px;
  cursor: pointer;
}

.bar {
  width: 80%;
  height: 18px;
  background: #334155;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

#wfl {
  height: 100%;
  width: 50%;
  background: #22c55e;
}

input {
  width: 95%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<h1>Dragon Adventures Trade W/F/L</h1>

<div class="container">

  <div class="trade-box">
    <h2>You</h2>
    <div id="youSlots" class="slots"></div>
  </div>

  <div class="middle">
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Blue_Arrow_Right.svg" class="arrow">
  </div>

  <div class="trade-box">
    <h2>Them</h2>
   <div class="swap">🔁</div>
  </div>

</div>

<div class="bar">
  <div id="wfl"></div>
</div>

<div id="wflText"></div>
<div id="result"></div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <input id="searchBox" placeholder="Search dragons..." oninput="filterDragons()">
  <div id="dragonList" class="dragon-list"></div>
</div>

<div class="popup" id="optionsPopup">
  <h3>Dragon Options</h3>
  <label><input type="checkbox" id="mut"> Mutation</label>
  <label><input type="checkbox" id="legC"> Legendary Color</label>
  <label><input type="checkbox" id="legE"> Legendary Eye</label>
  <br><br>
  <button onclick="confirmAdd()">Add Dragon</button>
</div>

<script>
// (your JS unchanged)

const dragons = [
  { name:"Veidreki", value:"35M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/a/aa/Veidreki_Icon.png" },
  { name:"Alatura", value:"17M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/d0/Alatura_Icon.png" },
  { name:"Moixura", value:"9M", type:"guild", img:"https://static.wikia.nocookie.net/dragon-adventures/images/2/27/Moixaura_Icon.png" },
  { name:"Venid", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/8/81/Venid_Icon.png" },
  { name:"Voltstorm", value:"3M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/7/76/Voltstorm_Icon.png" },
  { name:"Vulpiruth", value:"50K", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/b/b1/Vulpiruth_Icon.png" },
  { name:"Djaevelhest", value:"150K", type:"event", img:"https://static.wikia.nocookie.net/dragon-adventures/images/b/b0/Djaevelhest_Icon.png" },
  { name:"Impiavolo", value:"800K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/3/39/Impiavolo_Icon.png" },
  { name:"Seikarin", value: "4M", type:"season", img:"https://static.wikia.nocookie.net/dragon-adventures/images/d/df/Seikarin_Icon.png"},
  { name:"Constello", value:"9M", type:"guild", img:"https://static.wikia.nocookie.net/dragon-adventures/images/7/7c/Constello_Icon.png"},
  { name:"Eryndiorn", value:"10M", type:"guild", img:"https://static.wikia.nocookie.net/dragon-adventures/images/5/5f/Eryndiorn_Icon.png"},
  { name:"Agricos", value:"2K", type:"world", img:"https://static.wikia.nocookie.net/dragon-adventures/images/6/66/Agricos_Icon.png"},
];

const bonuses = {
  mutation: { world:250000, season:500000, guild:500000, event:250000 },
  legColor: { world:500000, season:1000000, guild:1000000, event:500000 },
  legEye: { world:500000, season:1000000, guild:1000000, event:1000000 }
};

let you=[], them=[], activeSide=null, pendingDragon=null;
const MAX=9;

function parse(v){
  v=v.toUpperCase();
  if(v.includes("M")) return parseFloat(v)*1e6;
  if(v.includes("K")) return parseFloat(v)*1e3;
  return parseFloat(v);
}

function getFinalValue(item){
  let base=parse(item.base.value), extra=0;
  if(item.mutation) extra+=bonuses.mutation[item.base.type]||0;
  if(item.legColor) extra+=bonuses.legColor[item.base.type]||0;
  if(item.legEye) extra+=bonuses.legEye[item.base.type]||0;
  return base+extra;
}

function render(){
  draw("youSlots",you,1);
  draw("themSlots",them,2);
}

function draw(id,list,side){
  let box=document.getElementById(id);
  box.innerHTML="";

  for(let i=0;i<MAX;i++){
    let slot=document.createElement("div");
    slot.className="slot";
    let item=list[i];

    if(item){
      slot.innerHTML=`
        <img src="${item.base.img}">
        <small>${item.base.name}</small>
        <button class="remove" onclick="remove(${side},${i})">➖</button>
      `;
    } else {
      slot.innerHTML=`<button class="add" onclick="openPopup(${side})">➕</button>`;
    }

    box.appendChild(slot);
  }
}

function openPopup(side){
  activeSide=side;
  popup.style.display="block";
  overlay.style.display="block";
  renderDragonList(dragons);
}

function closePopup(){
  popup.style.display="none";
  overlay.style.display="none";
  optionsPopup.style.display="none";
}

function renderDragonList(list){
  let box=document.getElementById("dragonList");
  box.innerHTML="";
  list.forEach(d=>{
    let div=document.createElement("div");
    div.className="dragon-card";
    div.innerHTML=`<img src="${d.img}"><div>${d.name}</div>`;
    div.onclick=()=>addDragon(d);
    box.appendChild(div);
  });
}

function addDragon(d){
  pendingDragon=d;
  optionsPopup.style.display="block";
}

function confirmAdd(){
  let item={
    base:pendingDragon,
    mutation:mut.checked,
    legColor:legC.checked,
    legEye:legE.checked
  };
  if(activeSide===1 && you.length<MAX) you.push(item);
  if(activeSide===2 && them.length<MAX) them.push(item);
  closePopup();
  update();
}

function remove(side,i){
  side===1?you.splice(i,1):them.splice(i,1);
  update();
}

function update(){
  render();
  let y=you.reduce((s,i)=>s+getFinalValue(i),0);
  let t=them.reduce((s,i)=>s+getFinalValue(i),0);
  let diff=t-y;

  let label = diff===0 ? "FAIR TRADE" :
              Math.abs(diff)<1_000_000 ? (diff>0?"SMALL WIN":"SMALL LOSS") :
              (diff>0?"WIN":"LOSS");

  let w=50+(diff/Math.max(y,t||1))*50;
  w=Math.max(0,Math.min(100,w));

  wfl.style.width=w+"%";
  wfl.style.background=diff>0?"#22c55e":diff<0?"#ef4444":"#facc15";

  wflText.innerText=label;
  result.innerText=`You: ${y.toLocaleString()} | Them: ${t.toLocaleString()}`;
}

render();
update();
</script>

</body>
</html>
